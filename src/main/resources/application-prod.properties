server.port=${SERVER_PORT:8080}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
app.security.jwt.issuer=${JWT_ISSUER:ttravels-backend}
app.security.jwt.access-secret=${JWT_ACCESS_SECRET}
app.security.jwt.access-ttl=${JWT_ACCESS_TTL:15m}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.security.jwt.refresh-ttl=${JWT_REFRESH_TTL:30d}
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
